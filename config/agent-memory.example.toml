# Copy to <runtime>/config/agent-memory.toml after installing the runtime.
# AGENT_MEMORY_* environment variables override matching values in this file.

memory_root = "/path/to/your/agent-memory-vault"
git_root = "/path/to/git-root-containing-the-vault"
config_root = "~/.config/agent-memory"
state_db = "~/.config/agent-memory/state.sqlite"
audit_db = "~/.config/agent-memory/audit_decisions.sqlite"
closeout_log = "~/.config/agent-memory/logs/closeout.jsonl"
audit_run_log = "~/.config/agent-memory/logs/audit_runs.jsonl"
audit_report = "~/.config/agent-memory/reports/latest-audit.json"
invariants_file = "~/.config/agent-memory/config/system-invariants.json"
python = "python3"

user_id = "demo-user"
agent_id = "shared"
app_id = "agent-memory"

[closeout]
ordinary_memory_candidate_pool = false
ask_before_skill_promotion = true
run_sqlite_index_after_closeout = true
run_audit_after_interval_days = 7
commit_scoped_memory_files = true

[semantic_retrieval]
enabled = false
vector_dir = "~/.config/agent-memory/zvec/memory_chunks_embeddinggemma_768"
embedding_model = "google/embeddinggemma-300m"
embedding_dim = 768
embedding_device = "cpu"
python = "python3"
lock_path = "~/.config/agent-memory/locks/zvec.lock"
require_local_model = false
model_revision = ""
model_manifest = "~/.config/agent-memory/models/embeddinggemma-300m/model-manifest.json"
dependency_lock = "~/.config/agent-memory/requirements-vector.lock"
run_vector_index_after_closeout = false

[privacy]
include_real_vault = false
include_state_db = false
include_env_file = false
include_vector_db = false
include_model_cache = false
