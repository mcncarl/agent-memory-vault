# Example config. The current scripts use environment variables by default.
# You can keep this file as human-readable documentation for your setup.

memory_root = "/path/to/your/codex-memory-vault"
git_root = "/path/to/git-root-containing-the-vault"
config_root = "~/.config/codex-memory"
state_db = "~/.config/codex-memory/state.sqlite"
audit_db = "~/.config/codex-memory/audit_decisions.sqlite"
closeout_log = "~/.config/codex-memory/logs/closeout.jsonl"
audit_run_log = "~/.config/codex-memory/logs/audit_runs.jsonl"
audit_report = "~/.config/codex-memory/reports/latest-audit.json"
python = "python3"

user_id = "demo-user"
agent_id = "shared"
app_id = "agent-memory"

[closeout]
ordinary_memory_candidate_pool = false
ask_before_skill_promotion = true
run_sqlite_index_after_closeout = true
run_audit_after_interval_days = 7
commit_scoped_memory_files = true

[semantic_retrieval]
enabled = false
vector_dir = "~/.config/codex-memory/zvec/memory_chunks_embeddinggemma_768"
embedding_model = "google/embeddinggemma-300m"
embedding_dim = 768
embedding_device = "cpu"
python = "python3"
run_vector_index_after_closeout = false

[privacy]
include_real_vault = false
include_state_db = false
include_env_file = false
include_vector_db = false
include_model_cache = false
